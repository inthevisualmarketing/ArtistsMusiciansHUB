<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMH — SIGNAL INCOMING</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green:       #00ff41;
      --green-dim:   #00c832;
      --green-dark:  #003b0f;
      --green-glow:  rgba(0, 255, 65, 0.15);
      --green-mid:   rgba(0, 255, 65, 0.45);
      --bg:          #000a02;
      --bg-surface:  #001405;
      --text-muted:  #2a7a3b;
      --text-dim:    #1a4a26;
      --cyan:        #00ffe7;
      --pink:        #ff2a6d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── SCANLINES ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 50;
    }

    /* ── VAPORWAVE GRID FLOOR ── */
    .grid-floor {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 55vh;
      perspective: 300px;
      perspective-origin: 50% 0%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .grid-inner {
      position: absolute;
      inset: 0;
      transform: rotateX(55deg);
      transform-origin: top center;
      background-image:
        linear-gradient(rgba(0,255,65,0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,65,0.12) 1px, transparent 1px);
      background-size: 60px 60px;
      background-position: center top;
      animation: gridScroll 3s linear infinite;
    }

    @keyframes gridScroll {
      from { background-position: center 0px; }
      to   { background-position: center 60px; }
    }

    /* Grid fade — top fades to bg, bottom stays */
    .grid-floor::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        var(--bg) 0%,
        transparent 30%,
        transparent 70%,
        var(--bg) 100%
      );
      pointer-events: none;
    }

    /* ── TOP HORIZON GLOW ── */
    .horizon {
      position: fixed;
      bottom: 45vh;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--green), var(--cyan), var(--green), transparent);
      box-shadow: 0 0 20px var(--green), 0 0 60px rgba(0,255,65,0.3), 0 -2px 40px rgba(0,255,65,0.15);
      z-index: 1;
      pointer-events: none;
    }

    /* ── ELECTRIC GRID CANVAS ── */
    #electric {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    /* ── CORNER BRACKETS ── */
    .corner {
      position: fixed;
      width: 32px;
      height: 32px;
      border-color: var(--green);
      border-style: solid;
      opacity: 0.6;
      z-index: 20;
    }
    .tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
    .tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
    .bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
    .br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

    /* ── HUD BARS ── */
    .hud-top, .hud-bottom {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 36px;
      font-size: 10px;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      z-index: 20;
      white-space: nowrap;
    }
    .hud-top    { top: 22px; }
    .hud-bottom { bottom: 22px; }
    .hud-live   { color: var(--green); animation: blink 1.1s step-end infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── MAIN CONTENT ── */
    .stage {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;
      padding: 0 24px;
      animation: fadeUp 1.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Music symbols */
    .symbols {
      display: flex;
      gap: 28px;
      font-size: 32px;
      animation: fadeUp 1.2s 0.2s ease both;
    }
    .sym-1 { color: var(--green);  filter: drop-shadow(0 0 8px var(--green));  animation: pulse 1.8s 0.0s ease-in-out infinite; }
    .sym-2 { color: var(--cyan);   filter: drop-shadow(0 0 8px var(--cyan));   animation: pulse 1.8s 0.3s ease-in-out infinite; }
    .sym-3 { color: var(--pink);   filter: drop-shadow(0 0 8px var(--pink));   animation: pulse 1.8s 0.6s ease-in-out infinite; }
    .sym-4 { color: var(--green);  filter: drop-shadow(0 0 8px var(--green));  animation: pulse 1.8s 0.9s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 0.45; }
      50%       { opacity: 1; }
    }

    /* Brand name */
    .brand {
      font-family: 'VT323', monospace;
      font-size: clamp(36px, 8vw, 72px);
      letter-spacing: 0.25em;
      color: var(--green);
      text-shadow:
        0 0 10px var(--green),
        0 0 30px rgba(0,255,65,0.5),
        0 0 70px rgba(0,255,65,0.2);
      animation: fadeUp 1.2s 0.1s ease both, glitchBrand 8s 3s infinite;
    }

    @keyframes glitchBrand {
      0%, 92%, 100% { transform: none; text-shadow: 0 0 10px var(--green), 0 0 30px rgba(0,255,65,0.5); }
      93%  { transform: translate(-3px, 0); text-shadow: -3px 0 var(--cyan), 3px 0 var(--pink); }
      94%  { transform: translate(3px, 0);  text-shadow: 3px 0 var(--cyan), -3px 0 var(--pink); }
      95%  { transform: none; }
      96%  { transform: translate(-2px, 1px); }
      97%  { transform: none; }
    }

    /* Signal line */
    .signal-line {
      font-size: clamp(10px, 1.8vw, 13px);
      letter-spacing: 0.5em;
      color: var(--green-dim);
      animation: fadeUp 1.2s 0.3s ease both;
    }

    /* Countdown wrapper */
    .countdown-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: fadeUp 1.2s 0.4s ease both;
    }

    .countdown-label {
      font-size: 10px;
      letter-spacing: 0.35em;
      color: var(--text-muted);
    }

    .countdown {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .digit {
      font-family: 'VT323', monospace;
      font-size: clamp(52px, 10vw, 88px);
      line-height: 1;
      color: var(--green);
      text-shadow:
        0 0 8px var(--green),
        0 0 24px rgba(0,255,65,0.4);
      min-width: 2ch;
      text-align: center;
      position: relative;
      transition: color 0.1s;
    }

    /* Digit box */
    .digit-box {
      border: 1px solid rgba(0,255,65,0.2);
      padding: 4px 12px;
      background: rgba(0,255,65,0.03);
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
      position: relative;
      overflow: hidden;
    }

    /* scan sweep on digit box */
    .digit-box::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,255,65,0.06), transparent);
      animation: sweep 4s linear infinite;
    }

    @keyframes sweep {
      from { left: -60%; }
      to   { left: 160%; }
    }

    .unit-label {
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--text-muted);
    }

    .colon {
      font-family: 'VT323', monospace;
      font-size: clamp(52px, 10vw, 88px);
      color: var(--green-dim);
      line-height: 1;
      padding-bottom: 20px;
      animation: blink 1s step-end infinite;
      text-shadow: 0 0 8px var(--green-dim);
    }

    /* Target date */
    .target-date {
      font-size: clamp(11px, 1.6vw, 13px);
      letter-spacing: 0.3em;
      color: var(--text-muted);
      animation: fadeUp 1.2s 0.5s ease both;
    }
    .target-date span {
      color: var(--green);
      text-shadow: 0 0 8px rgba(0,255,65,0.6);
    }

    /* Progress bar */
    .progress-section {
      width: min(480px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: fadeUp 1.2s 0.6s ease both;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
    }

    .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(0,255,65,0.1);
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #003b0f, var(--green), var(--cyan));
      box-shadow: 0 0 8px var(--green);
      transition: width 1s linear;
    }

    /* Tagline */
    .tagline {
      font-size: 11px;
      letter-spacing: 0.28em;
      color: var(--text-dim);
      animation: fadeUp 1.2s 0.7s ease both;
    }

    /* EXPIRED state */
    .expired-msg {
      font-family: 'VT323', monospace;
      font-size: clamp(28px, 5vw, 48px);
      color: var(--green);
      text-shadow: 0 0 20px var(--green);
      letter-spacing: 0.2em;
      animation: glitchBrand 2s infinite;
    }

    /* Responsive */
    @media (max-width: 520px) {
      .countdown { gap: 4px; }
      .digit-box { padding: 4px 8px; }
      .colon { padding-bottom: 16px; }
      .hud-top, .hud-bottom { gap: 16px; font-size: 9px; }
    }
  </style>
</head>
<body>

  <!-- Electric grid canvas -->
  <canvas id="electric"></canvas>

  <!-- Vaporwave grid floor -->
  <div class="grid-floor"><div class="grid-inner"></div></div>
  <div class="horizon"></div>

  <!-- Corner brackets -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- HUD bars -->
  <div class="hud-top">
    <span>AMH_SYS</span>
    <span class="hud-live">◈ SIGNAL INCOMING</span>
    <span id="clock">00:00:00</span>
  </div>
  <div class="hud-bottom">
    <span>SAN ANTONIO TX</span>
    <span>EST. 2018</span>
    <span>1M+ STREAMS</span>
  </div>

  <!-- Main stage -->
  <div class="stage">

    <!-- Music symbols -->
    <div class="symbols">
      <span class="sym-1">𝄞</span>
      <span class="sym-2">♩</span>
      <span class="sym-3">♫</span>
      <span class="sym-4">𝄢</span>
    </div>

    <!-- Brand -->
    <div class="brand">ARTISTS MUSICIANS HUB</div>

    <!-- Signal text -->
    <div class="signal-line">SIGNAL DETECTED · AMPLIFYING</div>

    <!-- Countdown -->
    <div class="countdown-wrap">
      <div class="countdown-label">SYSTEM LAUNCH IN</div>
      <div class="countdown" id="countdown">
        <div class="unit">
          <div class="digit-box"><div class="digit" id="days">00</div></div>
          <div class="unit-label">DAYS</div>
        </div>
        <div class="colon">:</div>
        <div class="unit">
          <div class="digit-box"><div class="digit" id="hours">00</div></div>
          <div class="unit-label">HRS</div>
        </div>
        <div class="colon">:</div>
        <div class="unit">
          <div class="digit-box"><div class="digit" id="mins">00</div></div>
          <div class="unit-label">MIN</div>
        </div>
        <div class="colon">:</div>
        <div class="unit">
          <div class="digit-box"><div class="digit" id="secs">00</div></div>
          <div class="unit-label">SEC</div>
        </div>
      </div>
    </div>

    <!-- Target date -->
    <div class="target-date">
      LAUNCHING <span>SATURDAY · MARCH 7 · 3:00 PM CST</span>
    </div>

    <!-- Progress bar -->
    <div class="progress-section">
      <div class="progress-meta">
        <span>AMPLIFY ENGINE LOADING</span>
        <span id="pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- Tagline -->
    <div class="tagline">AMPLIFY YOUR MUSIC · OWN YOUR SOUND</div>

  </div>

  <script>
    // ── CLOCK ──────────────────────────────────────────────
    function updateClock() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('en-US', { hour12: false });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── COUNTDOWN ──────────────────────────────────────────
    // Target: Saturday March 7 2026 15:00:00 CST (UTC-6)
    const TARGET = new Date('2026-03-07T21:00:00Z').getTime();

    // Compute total window for progress bar (from now to target at page load)
    const START = Date.now();
    const TOTAL = Math.max(TARGET - START, 1);

    function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

    function tick() {
      const now  = Date.now();
      const diff = TARGET - now;

      if (diff <= 0) {
        // Countdown complete
        document.getElementById('countdown').innerHTML =
          '<div class="expired-msg">SYSTEM ONLINE</div>';
        document.getElementById('pct').textContent = '100%';
        document.getElementById('progress-fill').style.width = '100%';
        return;
      }

      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000)  / 60000);
      const s = Math.floor((diff % 60000)    / 1000);

      document.getElementById('days').textContent  = pad(d);
      document.getElementById('hours').textContent = pad(h);
      document.getElementById('mins').textContent  = pad(m);
      document.getElementById('secs').textContent  = pad(s);

      // Progress: how far through the countdown window we are
      const elapsed = now - START;
      const pct = Math.min(100, Math.round((elapsed / TOTAL) * 100));
      document.getElementById('pct').textContent = pct + '%';
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    tick();
    setInterval(tick, 1000);

    // ── ELECTRIC GRID ──────────────────────────────────────
    (function() {
      const canvas = document.getElementById('electric');
      const ctx    = canvas.getContext('2d');
      let pulses   = [];
      let nextId   = 0;
      const GRID   = 40;
      const occupied = new Map();

      const COLORS = ['0,255,65', '0,255,65', '0,255,231', '255,42,109'];

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      function pickDir(col, row, avoid, cols, rows) {
        const dirs = [{dc:1,dr:0},{dc:-1,dr:0},{dc:0,dr:1},{dc:0,dr:-1}];
        const valid = dirs.filter(d => {
          const nc = col+d.dc, nr = row+d.dr;
          return nc>=0 && nc<=cols && nr>=0 && nr<=rows;
        });
        const pool = avoid
          ? (valid.filter(d => !(d.dc===avoid.dc && d.dr===avoid.dr)) || valid)
          : valid;
        return (pool.length ? pool : valid)[Math.floor(Math.random() * (pool.length||valid.length))];
      }

      function createPulse() {
        const cols = Math.floor(canvas.width  / GRID);
        const rows = Math.floor(canvas.height / GRID);
        const col  = Math.floor(Math.random() * cols);
        const row  = Math.floor(Math.random() * rows);
        const dir  = pickDir(col, row, null, cols, rows);
        const id   = nextId++;
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];
        return {
          id, color, col, row, dir, t: 0,
          speed: 0.004 + Math.random() * 0.004,
          trailLength: 3 + Math.floor(Math.random() * 3),
          alpha: 0.16 + Math.random() * 0.12,
          trail: [], done: false, _steps: 0, cols, rows,
        };
      }

      pulses.push(createPulse());
      setTimeout(() => { if (pulses.filter(p=>!p.done).length < 2) pulses.push(createPulse()); }, 2400);

      function maybeRespawn() {
        if (pulses.filter(p=>!p.done).length < 2) pulses.push(createPulse());
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        pulses.forEach(p => {
          if (p.done) return;

          const px = p.col * GRID + p.dir.dc * GRID * p.t;
          const py = p.row * GRID + p.dir.dr * GRID * p.t;
          p.trail.push({x: px, y: py});
          if (p.trail.length > p.trailLength * 18) p.trail.shift();

          p.t += p.speed;
          if (p.t >= 1) {
            p.t = 0;
            p.col += p.dir.dc;
            p.row += p.dir.dr;

            if (p.col <= 0 || p.col >= p.cols) {
              p.dir = {dc: -p.dir.dc, dr: p.dir.dr};
              p.col = Math.max(0, Math.min(p.cols, p.col));
            }
            if (p.row <= 0 || p.row >= p.rows) {
              p.dir = {dc: p.dir.dc, dr: -p.dir.dr};
              p.row = Math.max(0, Math.min(p.rows, p.row));
            }

            const key = `${p.col},${p.row}`;
            const otherId = occupied.get(key);
            if (otherId !== undefined && otherId !== p.id) {
              const other = pulses.find(q => q.id === otherId && !q.done);
              if (other) {
                p.dir     = pickDir(p.col,     p.row,     p.dir,     p.cols, p.rows);
                other.dir = pickDir(other.col, other.row, other.dir, other.cols, other.rows);
              }
            }
            occupied.set(key, p.id);

            if (Math.random() < 0.08) p.dir = pickDir(p.col, p.row, p.dir, p.cols, p.rows);

            p._steps++;
            if (p._steps > 600) {
              p.done = true;
              setTimeout(maybeRespawn, 800 + Math.random() * 1200);
            }
          }

          if (p.trail.length < 2) return;
          for (let i = 1; i < p.trail.length; i++) {
            const a = p.trail[i-1], b = p.trail[i];
            const progress = i / p.trail.length;
            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(${p.color},${progress * p.alpha * 0.35})`;
            ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.stroke();
            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(${p.color},${progress * p.alpha})`;
            ctx.lineWidth = 1; ctx.stroke();
          }

          const head = p.trail[p.trail.length - 1];
          if (head) {
            const g = ctx.createRadialGradient(head.x, head.y, 0, head.x, head.y, 5);
            g.addColorStop(0, `rgba(${p.color},${p.alpha * 1.4})`);
            g.addColorStop(1, `rgba(${p.color},0)`);
            ctx.beginPath(); ctx.arc(head.x, head.y, 5, 0, Math.PI*2);
            ctx.fillStyle = g; ctx.fill();
          }
        });

        pulses = pulses.filter(p => !p.done);
        requestAnimationFrame(draw);
      }

      draw();
    })();
  </script>
</body>
</html>
