app = "artists-musicians-hub-staging"
primary_region = "dfw"


[env]
  NODE_ENV = "staging"
  LOG_LEVEL = "debug"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  strategy = "rolling"
  wait_timeout = "300s"
